<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paris, France</title>
    <meta name="description" content="A page showcasing Paris, France">
    <link rel="stylesheet" href="styles/place.css">
    <link rel="stylesheet" href="styles/place-large.css" media="screen and (min-width: 800px)">
    <script src="scripts/place.js" defer></script>
</head>
<body>
    <header>
        <h1>Paris, France</h1>
    </header>
    <main>
        <section class="hero">
            <picture>
                <source srcset="images/paris-hero-large.webp" media="(min-width: 800px)">
                <img src="images/paris-hero-small.webp" alt="Hero image of Paris">
            </picture>
        </section>
        <section class="description">
            <h2>About Paris</h2>
            <p>Paris, the capital of France, is renowned for its art, fashion, gastronomy, and culture. Known as the City of Light, it features iconic landmarks like the Eiffel Tower and Louvre Museum.</p>
        </section>
        <section class="weather">
            <h2>Weather</h2>
            <img src="images/weather-svgrepo-com.svg" alt="Weather icon" class="weather-icon">
            <div class="weather-info">
                <p>Temperature: 15°C</p>
                <p>Wind Speed: 10 km/h</p>
                <p>Wind Chill: <span id="wind-chill"></span></p>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; <span id="current-year"></span> | Last Modified: <span id="lastModified"></span></p>
    </footer>
</body>
</html>
