<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Lazy loading image gallery with fade-in animation.">
    <title>Lazy Loading Gallery</title>
    <link rel="stylesheet" href="styles/lazyload.css">
    <script src="scripts/lazyload.js" defer></script>
</head>
<body>
    <header></header>
    <main>
        <h1>Lazy Loading Gallery</h1>
        <img src="https://picsum.photos/id/1015/400/650" alt="Misty mountain landscape" width="400" height="650" loading="lazy">
        <img src="https://picsum.photos/id/1025/400/650" alt="Portrait of a curious dog" width="400" height="650" loading="lazy">
        <img src="https://picsum.photos/id/1035/400/650" alt="Rocky shoreline with ocean waves" width="400" height="650" loading="lazy">
        <img src="https://picsum.photos/id/1041/400/650" alt="Forest road disappearing into the distance" width="400" height="650" loading="lazy">
        <img src="https://picsum.photos/id/1050/400/650" alt="Waterfall flowing through a canyon" width="400" height="650" loading="lazy">
        <img src="https://picsum.photos/id/1062/400/650" alt="Desert dunes under a bright sky" width="400" height="650" loading="lazy">
    </main>
    <footer>
        <p>Images created for a lazy loading practice page.</p>
        <p>Last Modified: <span id="lastModified"></span></p>
    </footer>
</body>
</html>
